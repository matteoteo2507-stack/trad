# Level Analyzer — Fase A (notifica → manuale). Parametri da spec validata.
# Asset validati al netto dei costi: XAUUSD (13y) e BTCUSD (6y). EURUSD escluso.

# Sorgente dati in produzione:
#   yfinance  -> host Linux/cloud (Hetzner). Oro = GC=F futures (offset ~$10-20 vs spot,
#                vedi 'note'); BTC = BTC-USD (~spot). Nessuna dipendenza da MT5.
#   mt5       -> host Windows con terminale MT5 connesso (dati spot reali).
data_backend: yfinance

atr_n: 14
k_sl: 0.5              # SL = k_sl * ATR(H1)
rr: 1.5              # RR primario (cross-asset robusto netto); su XAU regge anche 1:2
cluster_tol_pct: 0.25
h1_window: 120
proximity_atr: 0.25   # alerta quando il prezzo entra entro proximity_atr*ATR dalla zona
max_dist_atr: 8.0     # considera solo zone entro questa distanza dal prezzo
poll_seconds: 300

# Sizing guardrail (vol-drag-aware) — vedi analysis/trading-bot-eval/SIZING_SPEC.md
# Mostrato nell'alert (Fase A informativa). Start conservativo 0.5% perche' NON ancora
# forward-tested; salire verso 1.0% (tetto) solo a edge confermato sul forward log.
risk_pct_per_trade: 0.5    # % del conto a rischio per singolo trade conf=2
risk_pct_aggregate: 2.0    # % max a rischio simultaneo su zone conf=2 concorrenti

telegram_chat_id: ""    # chat id del canale (negativo, -100...); token da .env
telegram_token_env: TELEGRAM_BOT_TOKEN   # nome della variabile .env col token del bot
log_path: level_analyzer/trade_records.csv   # spina dati contestualizzata (gitignored)

assets:
  - name: XAUUSD
    mt5_symbol: XAUUSD
    yf_ticker: "GC=F"
    spread_assumed: 0.10        # spread reale broker (per la spina; NON spread live con yfinance)
    note: "Prezzi su GC=F futures — RICONFERMA la zona sul tuo grafico XAUUSD spot (~$10-20 offset)."
    d1_csv: analysis/trading-bot-eval/data/XAU_spot_D1.csv
    h1_csv: analysis/trading-bot-eval/data/XAU_spot_H1.csv
  - name: BTCUSD
    mt5_symbol: BTCUSD
    yf_ticker: "BTC-USD"
    spread_assumed: 13          # spread reale demo FPM (per la spina)
    note: ""
    d1_csv: analysis/trading-bot-eval/data/BTC_spot_D1.csv
    h1_csv: analysis/trading-bot-eval/data/BTC_spot_H1.csv
